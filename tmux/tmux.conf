# ----------------------------
# 基本設定
# ----------------------------
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g history-limit 10000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -sg escape-time 10
set -g focus-events on
set -g mouse on

# ----------------------------
# プレフィックスキー変更 (Ctrl-b → Ctrl-a)
# ----------------------------
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ----------------------------
# キーバインド
# ----------------------------
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

bind -r p previous-window
bind -r n next-window

setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle

# ----------------------------
# ステータスバー
# ----------------------------
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=colour235,fg=colour136"
set -g status-left-length 32
set -g status-left "#[fg=colour235,bg=colour136,bold] #S #[fg=colour136,bg=colour235,nobold]"
set -g status-right-length 64
set -g status-right "#[fg=colour245] %Y-%m-%d %H:%M #[fg=colour136,bg=colour235]#[fg=colour235,bg=colour136,bold] #h "
setw -g window-status-format "#[fg=colour245,bg=colour235] #I #W "
setw -g window-status-current-format "#[fg=colour235,bg=colour136,bold] #I #W "
set -g pane-border-style "fg=colour235"
set -g pane-active-border-style "fg=colour136"
